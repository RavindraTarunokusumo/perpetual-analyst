{% extends "base.html" %}
{% block content %}
<div class="reading">
<h1>Reading</h1>
{% for d in dossiers %}
<article class="card">
  <div class="label"><a href="{{ url_for('topic', slug=d.slug) }}">{{ d.name }}</a> · updated {{ d.updated_at or '—' }}</div>
  <div class="prose">{{ d.content | markdown | safe }}</div>
</article>
{% else %}
<p class="empty">No dossiers yet.</p>
{% endfor %}
</div>
{% endblock %}
